 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Athlete</title>
  <link rel="stylesheet" href="css/style.css">
</head>
  <div id="resultPopup" class="popup">
  <div class="popup-box">
    <h2>🎉 Test Completed</h2>

    <p>⚡ WPM: <span id="finalWpm">0</span></p>
    <p>🎯 Accuracy: <span id="finalAccuracy">100%</span></p>
    <p>❌ Errors: <span id="finalErrors">0</span></p>

    <button id="closePopup">Close</button>
  </div>
  </div>
<body>

<header>
  <h1>⌨️ Typing Athlete</h1>
  <span id="playerName"></span>
  <button id="themeBtn">🌙 Dark</button>
</header>

<div class="container">

<div class="timer-select">
  <label>Select Time:</label>

  <select id="timeSelect">
    <option value="15">15 Seconds</option>
    <option value="30">30 Seconds</option>
    <option value="60" selected>60 Seconds</option>
    <option value="120">120 Seconds</option>
  </select>
</div> 
  <div class="stats">
    <div>⏱ Time: <span id="timer">60</span></div>
    <div>⚡ WPM: <span id="wpm">0</span></div>
    <div>🎯 Accuracy: <span id="accuracy">100%</span></div>
    <div>❌ Errors: <span id="errors">0</span></div>
  </div>

 <div class="progress">
    <div id="progressBar"></div>
 </div>
  <div id="quote">
    Click Start to begin...
  </div>

  <textarea
    id="input"
    placeholder="Type here..."
    disabled>
  </textarea>

  <button id="startBtn">Start Test</button>
  <button id="restartBtn">Restart</button>

</div>

<script src="js/script.js"></script>
</body>
</html>
